<svg xmlns="http://www.w3.org/2000/svg" width="900" height="310" viewBox="0 0 900 310">

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
      </marker>
    </defs>
    

    <style>
      text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .title { font-size: 22px; font-weight: 700; }
      .subtitle { font-size: 13px; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 7; }
      .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 7; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 7; }
      .arrow { stroke: #475569; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .axis { stroke: #94a3b8; stroke-width: 1; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .russia { fill: #ef4444; stroke: #b91c1c; }
      .ukraine { fill: #2563eb; stroke: #1d4ed8; }
      .ci { stroke: #111827; stroke-width: 2.2; }
      .tick { stroke: #111827; stroke-width: 2; }
      .note { font-size: 12px; fill: #6b7280; }
    </style>
    
<text class="title" x="450" y="35" text-anchor="middle">损失强度比的 Bootstrap 区间</text>
<text class="subtitle" x="450" y="58" text-anchor="middle">比较参数 Bootstrap 与探索性 Block Bootstrap + BCa</text>
<line class="grid" x1="120.0" y1="80" x2="120.0" y2="230" />
<text class="note" x="120.0" y="255" text-anchor="middle">1.6</text>
<line class="grid" x1="272.6" y1="80" x2="272.6" y2="230" />
<text class="note" x="272.6" y="255" text-anchor="middle">1.8</text>
<line class="grid" x1="425.3" y1="80" x2="425.3" y2="230" />
<text class="note" x="425.3" y="255" text-anchor="middle">2.0</text>
<line class="grid" x1="577.9" y1="80" x2="577.9" y2="230" />
<text class="note" x="577.9" y="255" text-anchor="middle">2.2</text>
<line class="grid" x1="730.5" y1="80" x2="730.5" y2="230" />
<text class="note" x="730.5" y="255" text-anchor="middle">2.4</text>
<line class="axis" x1="120" y1="230" x2="845" y2="230" />
<line stroke="#dc2626" stroke-dasharray="5 5" x1="-337.9" y1="80" x2="-337.9" y2="230" />
<text x="102" y="130" font-size="15" font-weight="700" text-anchor="end">参数 Bootstrap</text>
<line class="ci" x1="440.3" y1="125" x2="511.3" y2="125" />
<line class="tick" x1="440.3" y1="117" x2="440.3" y2="133" />
<line class="tick" x1="511.3" y1="117" x2="511.3" y2="133" />
<circle fill="#7c3aed" stroke="#4c1d95" cx="475.0" cy="125" r="8" />
<text x="521.3" y="130" font-size="13">[2.02, 2.11]</text>
<text x="102" y="190" font-size="15" font-weight="700" text-anchor="end">Block Bootstrap + BCa</text>
<line class="ci" x1="288.5" y1="185" x2="733.5" y2="185" />
<line class="tick" x1="288.5" y1="177" x2="288.5" y2="193" />
<line class="tick" x1="733.5" y1="177" x2="733.5" y2="193" />
<circle fill="#7c3aed" stroke="#4c1d95" cx="474.9" cy="185" r="8" />
<text x="743.5" y="190" font-size="13">[1.82, 2.40]</text>
<text class="note" x="450" y="288" text-anchor="middle">Block + BCa 区间更宽，但仍不包含 1，支持双方损失强度存在差异。</text>
</svg>
