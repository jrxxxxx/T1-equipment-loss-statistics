<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="280" viewBox="0 0 1180 280">

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
      </marker>
    </defs>
    

    <style>
      text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .title { font-size: 22px; font-weight: 700; }
      .subtitle { font-size: 13px; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 7; }
      .accent { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 7; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 7; }
      .arrow { stroke: #475569; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .axis { stroke: #94a3b8; stroke-width: 1; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .russia { fill: #ef4444; stroke: #b91c1c; }
      .ukraine { fill: #2563eb; stroke: #1d4ed8; }
      .ci { stroke: #111827; stroke-width: 2.2; }
      .tick { stroke: #111827; stroke-width: 2; }
      .note { font-size: 12px; fill: #6b7280; }
    </style>
    
<text class="title" x="590" y="34" text-anchor="middle">统计方法链</text>
<text class="subtitle" x="590" y="58" text-anchor="middle">围绕教材中的点估计、最大似然估计、区间估计与大样本检验展开</text>
<rect class="box" x="30" y="95" width="165" height="86" />
<text x="112.5" y="130" font-size="17" font-weight="700" text-anchor="middle">Poisson 建模</text>
<text class="subtitle" x="112.5" y="155" text-anchor="middle">单位时间装备损失计数</text>
<path class="arrow" d="M 200 138.0 L 218 138.0" />
<rect class="accent" x="223" y="95" width="165" height="86" />
<text x="305.5" y="130" font-size="17" font-weight="700" text-anchor="middle">MLE 点估计</text>
<text class="subtitle" x="305.5" y="155" text-anchor="middle">lambda_hat = X / T</text>
<path class="arrow" d="M 393 138.0 L 411 138.0" />
<rect class="accent" x="416" y="95" width="165" height="86" />
<text x="498.5" y="130" font-size="17" font-weight="700" text-anchor="middle">Poisson 区间</text>
<text class="subtitle" x="498.5" y="155" text-anchor="middle">Wald / Score / Exact</text>
<path class="arrow" d="M 586 138.0 L 604 138.0" />
<rect class="accent" x="609" y="95" width="165" height="86" />
<text x="691.5" y="130" font-size="17" font-weight="700" text-anchor="middle">条件检验</text>
<text class="subtitle" x="691.5" y="155" text-anchor="middle">两独立 Poisson 率比较</text>
<path class="arrow" d="M 779 138.0 L 797 138.0" />
<rect class="box" x="802" y="95" width="165" height="86" />
<text x="884.5" y="130" font-size="17" font-weight="700" text-anchor="middle">分层估计</text>
<text class="subtitle" x="884.5" y="155" text-anchor="middle">装备类型 / 时间段</text>
<path class="arrow" d="M 972 138.0 L 990 138.0" />
<rect class="warn" x="995" y="95" width="165" height="86" />
<text x="1077.5" y="130" font-size="17" font-weight="700" text-anchor="middle">Bootstrap</text>
<text class="subtitle" x="1077.5" y="155" text-anchor="middle">Block + BCa 稳健性</text>
<text class="note" x="590" y="235" text-anchor="middle">说明：Bootstrap 使用探索性 Block Bootstrap + BCa，因乌方逐日日期来自 Oryx 文件名推断，作为稳健性补充。</text>
</svg>
